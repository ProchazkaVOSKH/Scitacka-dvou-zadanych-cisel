<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sčítání dvou čísel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <form>
            <input type="number" id="operand1" placeholder="První číslo">
            <input type="number" id="operand2" placeholder="Druhé číslo">
            <input type="number" id="result" placeholder="Výsledek" readonly>
            <div class="button-group">
                <button id="soucet" type="button">Součet</button>
                <button id="rozdil" type="button">Rozdíl</button>
            </div>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
